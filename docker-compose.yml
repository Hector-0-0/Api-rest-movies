# Entorno de desarrollo local: PostgreSQL + la API, ambos con `docker compose up`.
# La base se siembra sola desde schema.sql en el primer arranque.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moviesdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Solo corre en el primer arranque (directorio vacío): crea y siembra el esquema.
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d moviesdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/moviesdb
      DB_SSL: "false"
      CORS_ORIGINS: http://localhost:3000,http://localhost:8080
      JWT_SECRET: local-dev-secret-change-me
      JWT_EXPIRES_IN: 1d
      BCRYPT_ROUNDS: 10
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
