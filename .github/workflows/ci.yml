name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & test
    runs-on: ubuntu-latest

    # PostgreSQL de verdad, para que la suite de contrato corra contra los dos
    # backends y no solo contra el de memoria.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: moviesdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d moviesdb"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/moviesdb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Load database schema
        run: psql "$TEST_DATABASE_URL" -f schema.sql

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
